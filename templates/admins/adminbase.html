{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindML — Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #0a1628;
            --sky-mid: #0e2040;
            --sky-light: #163a6e;
            --teal: #00c8d4;
            --teal-dim: #007a82;
            --teal-glow: rgba(0,200,212,0.18);
            --gold: #f0c040;
            --gold-dim: #b89020;
            --white: #e8f4fc;
            --muted: #7ea8cc;
            --card-bg: rgba(14,32,64,0.82);
            --border: rgba(0,200,212,0.22);
            --gold-border: rgba(240,192,64,0.25);
            --navbar-h: 64px;
            --radius: 4px;
            --font-head: 'Rajdhani', sans-serif;
            --font-body: 'Exo 2', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
            /* Admin accent: gold instead of teal for highlights */
            --admin-accent: #f0c040;
            --admin-accent-dim: #b89020;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background-color: var(--sky);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: var(--navbar-h);
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("{% static 'pexels-enrique72-10785841.jpg' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.22) saturate(0.6);
            z-index: -2;
        }
        body::after {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(180,140,0,0.12) 0%, transparent 70%),
                linear-gradient(180deg, rgba(10,22,40,0.6) 0%, rgba(10,22,40,0.88) 100%);
            z-index: -1;
        }

        /* ─── ADMIN NAVBAR ─── */
        .admin-navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--navbar-h);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            background: rgba(20,14,4,0.93);
            border-bottom: 1px solid var(--gold-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            gap: 1rem;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .nav-brand-icon {
            width: 34px; height: 34px;
            background: rgba(240,192,64,0.1);
            border: 1px solid rgba(240,192,64,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-brand-icon svg { width: 20px; height: 20px; }

        .nav-brand-text {
            font-family: var(--font-head);
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--white);
            line-height: 1;
        }
        .nav-brand-text span { color: var(--gold); }

        .nav-brand-sub {
            font-family: var(--font-mono);
            font-size: 0.52rem;
            color: var(--gold-dim);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            display: block;
            margin-top: 2px;
        }

        .nav-spacer { flex: 1; }

        .nav-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            background: none;
            border: none;
        }
        .nav-toggle span { display: block; width: 22px; height: 2px; background: var(--gold); border-radius: 2px; transition: all 0.3s; }

        /* Admin badge */
        .admin-badge {
            font-family: var(--font-mono);
            font-size: 0.62rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gold);
            background: rgba(240,192,64,0.1);
            border: 1px solid rgba(240,192,64,0.3);
            padding: 3px 10px;
            border-radius: 2px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2px;
            list-style: none;
        }

        .nav-links a {
            font-family: var(--font-head);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            color: var(--muted);
            text-decoration: none;
            padding: 6px 13px;
            border-radius: var(--radius);
            transition: color 0.2s;
            text-transform: uppercase;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 2px; left: 13px; right: 13px;
            height: 1px;
            background: var(--gold);
            transform: scaleX(0);
            transition: transform 0.2s;
        }

        .nav-links a:hover { color: var(--gold); }
        .nav-links a:hover::after { transform: scaleX(1); }

        .nav-links .btn-nav-gold {
            background: transparent;
            border: 1px solid var(--gold-dim);
            color: var(--gold);
            padding: 5px 16px;
            border-radius: 2px;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .nav-links .btn-nav-gold:hover {
            background: var(--gold);
            color: var(--sky);
            box-shadow: 0 0 18px rgba(240,192,64,0.4);
        }
        .nav-links .btn-nav-gold::after { display: none; }

        /* ─── MAIN ─── */
        .admin-main {
            min-height: calc(100vh - var(--navbar-h));
            padding: 2rem 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ─── CONTENT CARD ─── */
        .admin-card {
            background: var(--card-bg);
            border: 1px solid var(--gold-border);
            border-radius: 6px;
            padding: 2rem 2rem;
            backdrop-filter: blur(14px);
            box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(240,192,64,0.04);
            margin-bottom: 1.5rem;
        }

        /* ─── PAGE TITLE ─── */
        .page-title {
            font-family: var(--font-head);
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 0.3rem;
        }
        .page-title span { color: var(--gold); }

        .section-label {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold-dim);
            margin-bottom: 0.4rem;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            margin: 1.2rem 0;
        }

        /* ─── TABLE ─── */
        .wind-table { width: 100%; border-collapse: collapse; font-family: var(--font-body); font-size: 0.88rem; }
        .wind-table thead th {
            font-family: var(--font-head);
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
            background: rgba(30,20,4,0.7);
            border-bottom: 1px solid var(--gold-border);
            padding: 11px 14px;
            text-align: left;
            position: sticky; top: 0;
            white-space: nowrap;
        }
        .wind-table tbody td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(240,192,64,0.07);
            color: var(--muted);
            vertical-align: middle;
        }
        .wind-table tbody tr:hover td {
            background: rgba(240,192,64,0.04);
            color: var(--white);
        }

        /* ─── BADGES ─── */
        .badge-waiting {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            background: rgba(240,192,64,0.12);
            border: 1px solid rgba(240,192,64,0.35);
            color: var(--gold);
            padding: 3px 10px;
            border-radius: 2px;
        }
        .badge-active {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            background: rgba(0,200,212,0.1);
            border: 1px solid rgba(0,200,212,0.3);
            color: var(--teal);
            padding: 3px 10px;
            border-radius: 2px;
        }

        /* ─── ACTION LINKS ─── */
        .action-link {
            font-family: var(--font-head);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 4px 11px;
            border-radius: 2px;
            transition: all 0.2s;
            display: inline-block;
        }
        .action-activate {
            color: var(--teal);
            border: 1px solid rgba(0,200,212,0.3);
        }
        .action-activate:hover {
            background: rgba(0,200,212,0.12);
            color: var(--teal);
            box-shadow: 0 0 10px rgba(0,200,212,0.2);
        }
        .action-delete {
            color: #ff6b6b;
            border: 1px solid rgba(255,107,107,0.3);
        }
        .action-delete:hover {
            background: rgba(255,107,107,0.1);
            color: #ff6b6b;
        }

        /* ─── BUTTONS ─── */
        .btn-wind {
            display: inline-block;
            font-family: var(--font-head);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 9px 24px;
            border-radius: 2px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.25s;
        }
        .btn-gold { background: var(--gold); color: var(--sky); box-shadow: 0 0 16px rgba(240,192,64,0.25); }
        .btn-gold:hover { background: #ffe070; box-shadow: 0 0 28px rgba(240,192,64,0.45); transform: translateY(-1px); color: var(--sky); }
        .btn-teal { background: transparent; color: var(--teal); border: 1px solid var(--teal-dim); }
        .btn-teal:hover { background: rgba(0,200,212,0.1); }

        /* ─── ALERTS ─── */
        .alert-wind { padding: 10px 16px; border-radius: var(--radius); margin-bottom: 1rem; font-family: var(--font-body); font-size: 0.9rem; }
        .alert-error { background: rgba(220,50,50,0.14); border: 1px solid rgba(220,50,50,0.38); color: #ff8080; }
        .alert-success { background: rgba(0,200,212,0.1); border: 1px solid rgba(0,200,212,0.32); color: var(--teal); }

        /* ─── FOOTER ─── */
        footer {
            text-align: center;
            padding: 1.5rem 1rem;
            border-top: 1px solid var(--gold-border);
        }
        footer p {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            color: rgba(184,144,32,0.5);
            margin: 0;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            .nav-toggle { display: flex; }
            .admin-badge { display: none; }
            .nav-links {
                position: fixed;
                top: var(--navbar-h); left: 0; right: 0;
                background: rgba(20,14,4,0.97);
                border-bottom: 1px solid var(--gold-border);
                flex-direction: column;
                padding: 1.2rem 1.5rem;
                gap: 4px;
                transform: translateY(-110%);
                transition: transform 0.3s ease;
                z-index: 999;
            }
            .nav-links.open { transform: translateY(0); }
            .nav-links a { padding: 10px 14px; width: 100%; text-align: center; }
            .admin-main { padding: 1.5rem 1rem; }
            .admin-card { padding: 1.4rem 1rem; }
        }
    </style>
</head>
<body>

    <!-- ADMIN NAVBAR -->
    <nav class="admin-navbar">
        <a href="{% url 'AdminHome' %}" class="nav-brand">
            <div class="nav-brand-icon">
                <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v10l9 5 9-5V7z" stroke="#f0c040" stroke-width="1.5" stroke-linejoin="round"/><circle cx="12" cy="12" r="2.5" fill="#f0c040"/></svg>
            </div>
            <div>
                <span class="nav-brand-text">Wind<span>ML</span></span>
                <span class="nav-brand-sub">Admin Control Panel</span>
            </div>
        </a>

        <span class="admin-badge" style="margin-left:0.8rem;">⚙ Admin</span>

        <div class="nav-spacer"></div>

        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>

        <ul class="nav-links" id="navLinks">
            <li><a href="{% url 'AdminHome' %}">Dashboard</a></li>
            <li><a href="{% url 'RegisterUsersView' %}">Users</a></li>
            <li><a href="{% url 'index' %}" class="btn-nav-gold">Logout</a></li>
        </ul>
    </nav>

    <!-- MESSAGES -->
    {% if messages %}
    <div style="max-width:1200px;margin:0 auto;padding:0 1.5rem;">
        {% for message in messages %}
        <div class="alert-wind {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}" style="margin-top:1rem;">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- MAIN -->
    <main class="admin-main">
        {% block contents %}{% endblock %}
    </main>

    <footer>
        <p>WindML Admin Panel &mdash; Active Wind Power Forecasting System &mdash; &copy; 2025</p>
    </footer>

    <script>
        const toggle = document.getElementById('navToggle');
        const links  = document.getElementById('navLinks');
        if (toggle && links) {
            toggle.addEventListener('click', () => links.classList.toggle('open'));
        }
        links && links.querySelectorAll('a').forEach(a =>
            a.addEventListener('click', () => links.classList.remove('open'))
        );
    </script>
</body>
</html>
